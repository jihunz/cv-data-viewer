<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Data Annotator</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        /* Annotator Specific Styles */
        body { overflow: hidden; }
        .annotator-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 50px 1fr 60px;
            height: 100vh;
            width: 100vw;
        }
        
        .ann-header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
        }

        .ann-sidebar {
            grid-row: 2 / 3;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
        }

        .ann-canvas-area {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            background: #0f1115;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: crosshair;
        }
        
        /* AI Mode - Canvas Locked */
        .ann-canvas-area.ai-locked {
            cursor: not-allowed;
        }
        
        .ann-canvas-area.ai-locked::after {
            content: '🤖 AI Auto-Detect Running...';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(16, 185, 129, 0.9);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        .ann-footer {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        /* ===== Sidebar Design System ===== */
        .ann-sidebar {
            gap: 0 !important;
            padding: 0 !important;
        }

        /* Section */
        .sb-section {
            border-bottom: 1px solid var(--border);
        }

        .sb-section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            background: rgba(255,255,255,0.02);
            cursor: default;
            user-select: none;
        }

        .sb-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            flex: 1;
        }

        .sb-section-body {
            padding: 0.5rem 1rem 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Accent variants */
        .sb-section--accent-blue {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.06), rgba(139, 92, 246, 0.06));
        }

        .sb-section--accent-amber {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.06), rgba(239, 68, 68, 0.04));
        }

        .sb-section--accent-purple {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(168, 85, 247, 0.06));
        }

        /* Field */
        .sb-field {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .sb-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .sb-badge {
            font-size: 0.6rem;
            background: var(--accent);
            color: #fff;
            padding: 0 0.35rem;
            border-radius: 99px;
            font-weight: 700;
            line-height: 1.5;
        }

        .sb-hint {
            font-size: 0.65rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Input */
        .sb-input {
            width: 100%;
            padding: 0.35rem 0.5rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 5px;
            font-size: 0.8rem;
            transition: border-color 0.15s;
        }

        .sb-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .sb-input--narrow {
            width: 80px;
        }

        /* Toggle */
        .sb-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 0.3rem 0;
        }

        .sb-toggle input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Buttons */
        .sb-btn {
            padding: 0.35rem 0.65rem;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .sb-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .sb-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .sb-btn--primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .sb-btn--primary:hover {
            background: var(--accent-hover);
        }

        .sb-btn--ai {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.45rem 0.75rem;
        }

        .sb-btn--ai:hover {
            background: linear-gradient(135deg, #2563eb, #6d28d9);
        }

        .sb-btn--ai:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sb-btn-row {
            display: flex;
            gap: 0.4rem;
        }

        .sb-btn-row .sb-btn {
            flex: 1;
        }

        /* Radio */
        .sb-radio-row {
            display: flex;
            gap: 0.35rem;
        }

        .sb-radio-option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.5rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: border-color 0.15s;
        }

        .sb-radio-option:hover {
            border-color: var(--accent);
        }

        .sb-radio-option input[type="radio"] {
            accent-color: var(--accent);
            width: 13px;
            height: 13px;
        }

        .sb-radio-option input[type="radio"]:checked + span {
            color: var(--accent);
            font-weight: 600;
        }

        /* Slider */
        .sb-slider {
            width: 100%;
            accent-color: var(--accent);
        }

        .sb-slider-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sb-slider-row input[type="range"] {
            flex: 1;
            accent-color: var(--accent);
        }

        .sb-slider-value {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            min-width: 30px;
            text-align: right;
        }

        /* Sub-options (collapsible area) */
        .sb-sub-options {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            padding-left: 0.2rem;
        }

        .sb-sub-options.hidden,
        .sb-field.hidden {
            display: none !important;
        }

        .sb-divider-thin {
            border-top: 1px solid var(--border);
            margin: 0.2rem 0;
            opacity: 0.5;
        }

        /* Footer — reuse viewer pattern */
        .ann-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 0 1rem;
        }

        .ann-footer .control-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .ann-footer .btn {
            height: 36px;
            padding: 0 0.75rem;
            font-size: 0.8rem;
        }

        .ann-footer .btn svg {
            width: 18px;
            height: 18px;
        }

        .ann-footer .search-input {
            height: 36px;
            padding: 0 0.6rem;
            width: 160px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .ann-footer .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Box List */
        .box-list {
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
            padding: 0;
            margin: 0;
        }

        /* AI Status (keep for JS) */
        .ai-status {
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 3px;
            background: var(--bg-hover);
            font-weight: 600;
        }

        .ai-status.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .ai-status.loading {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            animation: pulse 1s infinite;
        }

        /* AI working glow */
        .ai-mode-section.ai-working {
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.2);
        }

        /* Range active */
        .sb-section--accent-purple.range-active {
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        /* Canvas Elements */
        #work-canvas {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .image-meta {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.8rem;
            pointer-events: none;
            max-width: 80%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .image-meta b {
            color: var(--accent);
            font-size: 0.7rem;
            margin-right: 0.2rem;
        }
    </style>
</head>
<body>
    <div class="annotator-layout">
        <!-- Header -->
        <header class="ann-header">
            <a href="/" class="brand" style="text-decoration: none;">
                CV Data <span>Annotator</span>
            </a>
            <div class="header-controls">
                <button class="btn primary" id="save-btn">Save Progress</button>
                <button class="btn danger" id="export-btn" onclick="window.openExportModal()">Export Dataset</button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="ann-sidebar">
            <!-- 1. Draw Mode -->
            <div class="sb-section sb-section--accent-amber">
                <div class="sb-section-header">
                    <span class="sb-section-title">Draw Mode</span>
                </div>
                <div class="sb-section-body">
                    <!-- Point Mode -->
                    <label class="sb-toggle">
                        <input type="checkbox" id="point-mode-toggle" />
                        <span>Point Mode (P)</span>
                    </label>
                    <div id="point-options" class="sb-sub-options hidden">
                        <div class="sb-field">
                            <label class="sb-label">Width <span id="point-w-val">0.15</span></label>
                            <input type="range" id="point-w" class="sb-slider" min="0.03" max="0.5" step="0.01" value="0.15" />
                        </div>
                        <div class="sb-field">
                            <label class="sb-label">Height <span id="point-h-val">0.30</span></label>
                            <input type="range" id="point-h" class="sb-slider" min="0.03" max="0.8" step="0.01" value="0.30" />
                        </div>
                        <small class="sb-hint">Wheel: Width / Shift+Wheel: Height</small>
                    </div>

                    <div class="sb-divider-thin"></div>

                    <!-- CSV -->
                    <label class="sb-toggle">
                        <input type="checkbox" id="csv-mode-toggle" />
                        <span>CSV Class Map</span>
                    </label>
                    <div id="csv-options" class="sb-sub-options hidden">
                        <div class="sb-field">
                            <label class="sb-label">CSV Path</label>
                            <input type="text" id="csv-path" class="sb-input" placeholder="/path/to/file.csv" />
                        </div>
                        <button type="button" class="sb-btn sb-btn--primary" id="csv-load-btn">Load CSV</button>
                        <small id="csv-status" class="sb-hint"></small>
                    </div>
                </div>
            </div>

            <!-- 2. AI Auto-Detect -->
            <div class="sb-section sb-section--accent-blue ai-mode-section">
                <div class="sb-section-header">
                    <span class="sb-section-title">AI Detect</span>
                    <span class="ai-status" id="ai-status"></span>
                </div>
                <div class="sb-section-body">
                    <label class="sb-toggle">
                        <input type="checkbox" id="ai-mode-toggle" />
                        <span>Enable AI Mode</span>
                    </label>

                    <div id="ai-options" class="sb-sub-options hidden">
                        <div class="sb-field">
                            <label class="sb-label">Model</label>
                            <select id="ai-model" class="sb-input">
                                <option value="yolo12x" selected>YOLO12X</option>
                            </select>
                        </div>

                        <div class="sb-field">
                            <label class="sb-label">Detection Mode</label>
                            <div class="sb-radio-row">
                                <label class="sb-radio-option">
                                    <input type="radio" name="detection-mode" value="all" checked />
                                    <span>All</span>
                                </label>
                                <label class="sb-radio-option">
                                    <input type="radio" name="detection-mode" value="specific" />
                                    <span>Specific</span>
                                </label>
                            </div>
                        </div>

                        <div id="class-filter-section" class="sb-field hidden">
                            <label class="sb-label">COCO Class IDs</label>
                            <input type="text" id="class-filter" class="sb-input" placeholder="0,1,2" />
                            <small class="sb-hint">Comma-separated COCO indices</small>
                        </div>

                        <div class="sb-field">
                            <label class="sb-label">Confidence</label>
                            <div class="sb-slider-row">
                                <input type="range" id="ai-confidence" class="sb-slider" min="0.1" max="0.9" step="0.05" value="0.25" />
                                <span class="sb-slider-value" id="confidence-value">0.25</span>
                            </div>
                        </div>

                        <button class="sb-btn sb-btn--ai" id="detect-current-btn">Start Batch Detection</button>
                    </div>
                </div>
            </div>

            <!-- 3. Class & Boxes -->
            <div class="sb-section">
                <div class="sb-section-header">
                    <span class="sb-section-title">Class & Boxes</span>
                </div>
                <div class="sb-section-body">
                    <div class="sb-field">
                        <label class="sb-label">Active Class ID</label>
                        <input type="number" id="class-id" class="sb-input" value="0" min="0" />
                        <small class="sb-hint">선택된 박스: 숫자키로 클래스 변경</small>
                    </div>

                    <label class="sb-toggle">
                        <input type="checkbox" id="auto-copy" checked />
                        <span>Copy boxes to next image</span>
                    </label>

                    <!-- Box List -->
                    <div class="sb-field">
                        <label class="sb-label">Boxes <span class="sb-badge" id="box-count">0</span></label>
                        <ul id="box-list" class="box-list">
                            <!-- Dynamic List -->
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 4. Range Edit -->
            <div class="sb-section sb-section--accent-purple">
                <div class="sb-section-header">
                    <span class="sb-section-title">Range Edit</span>
                </div>
                <div class="sb-section-body">
                    <div class="sb-field">
                        <label class="sb-label">Target Class</label>
                        <input type="number" id="range-class" class="sb-input sb-input--narrow" value="0" min="0" />
                    </div>
                    <div class="sb-btn-row">
                        <button class="sb-btn" id="range-start-btn">Mark Start</button>
                        <button class="sb-btn sb-btn--primary" id="range-apply-btn" disabled>Apply Range</button>
                    </div>
                    <small id="range-status" class="sb-hint"></small>
                </div>
            </div>
        </aside>

        <!-- Main Canvas -->
        <main class="ann-canvas-area" id="canvas-container">
            <canvas id="work-canvas"></canvas>
            <div class="image-meta" id="filename-display">Loading...</div>
        </main>

        <!-- Footer (viewer pattern) -->
        <footer class="ann-footer">
            <div class="control-group">
                <button id="first-btn" class="btn" title="First (↑)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
                </button>
                <button id="prev-btn" class="btn" title="Prev (A / ←)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                    Prev
                </button>
                <input type="text" id="progress-text" class="counter-input" value="0 / 0" />
                <button id="next-btn" class="btn" title="Next (D / →)">
                    Next
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </button>
                <button id="last-btn" class="btn" title="Last (↓)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <div class="control-group">
                <input type="text" id="search-input" class="search-input" placeholder="Search filename..." />
                <button id="auto-btn" class="btn" title="Auto Play (Space)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Auto
                </button>
                <input type="range" id="auto-speed" class="auto-speed-slider" min="33" max="2000" value="500" step="1" title="Auto Play Speed" />
                <span id="auto-speed-label" class="auto-speed-label">500ms</span>
            </div>
        </footer>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="loading hidden">
        <div class="dataset-form" style="width: 450px; text-align: left;">
            <h2 style="margin-bottom: 1.5rem;">Export Dataset</h2>
            
            <div class="input-grid">
                <div class="mode-field">
                    <label class="input-label" style="margin-bottom: 0.75rem;">Target Resolution</label>
                    
                    <!-- Preset Resolution Radio Buttons -->
                    <div class="resolution-presets" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem;">
                        <label class="resolution-option">
                            <input type="radio" name="resolution" value="640x480" checked onchange="applyResolutionPreset(this.value)">
                            <span>640 × 480</span>
                            <small>VGA</small>
                        </label>
                        <label class="resolution-option">
                            <input type="radio" name="resolution" value="1280x720" onchange="applyResolutionPreset(this.value)">
                            <span>1280 × 720</span>
                            <small>HD (720p)</small>
                        </label>
                        <label class="resolution-option">
                            <input type="radio" name="resolution" value="1920x1080" onchange="applyResolutionPreset(this.value)">
                            <span>1920 × 1080</span>
                            <small>Full HD (1080p)</small>
                        </label>
                        <label class="resolution-option">
                            <input type="radio" name="resolution" value="custom" onchange="applyResolutionPreset(this.value)">
                            <span>Custom</span>
                            <small>직접 입력</small>
                        </label>
                    </div>
                    
                    <!-- Custom Resolution Input -->
                    <div id="custom-resolution" class="custom-resolution-inputs" style="display: none;">
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <input type="number" id="resize-w" placeholder="Width" value="640" style="width: 100px;" />
                            <span>×</span>
                            <input type="number" id="resize-h" placeholder="Height" value="480" style="width: 100px;" />
                        </div>
                    </div>
                    
                    <p class="label-hint" style="margin-top: 0.75rem;">
                        Images will be stretched to this size. Labels are normalized so they remain valid.
                    </p>
                </div>
            </div>

            <div class="action-bar" style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                <button class="btn" id="cancel-export">Cancel</button>
                <button class="btn primary" id="confirm-export" onclick="window.handleExport()">Download ZIP</button>
            </div>
        </div>
    </div>
    
    <style>
        .resolution-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .resolution-option:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }
        .resolution-option input[type="radio"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }
        .resolution-option input[type="radio"]:checked + span {
            color: var(--accent);
            font-weight: 600;
        }
        .resolution-option span {
            flex: 1;
            font-size: 0.95rem;
        }
        .resolution-option small {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        .custom-resolution-inputs input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: white;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .custom-resolution-inputs input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* Batch Result Modal */
        .batch-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        .batch-modal.hidden {
            display: none !important;
        }

        .ann-canvas-area.point-cursor {
            cursor: none;
        }

        /* Class edit toast */
        .class-edit-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #10b981;
            font-size: 2rem;
            font-weight: 800;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            pointer-events: none;
            z-index: 200;
            font-family: 'Inter', monospace;
        }
    </style>

    <!-- Data Injection -->
    <script>
        window.annotateData = {{ data_json | safe }};
        
        // Inline definition to guarantee availability regardless of external script loading/caching
        window.openExportModal = function() {
            const modal = document.getElementById('export-modal');
            if (modal) modal.classList.remove('hidden');
            else alert("Export modal element not found in DOM!");
        };
        
        // Resolution preset handler
        function applyResolutionPreset(value) {
            const customDiv = document.getElementById('custom-resolution');
            const wInput = document.getElementById('resize-w');
            const hInput = document.getElementById('resize-h');
            
            if (value === 'custom') {
                customDiv.style.display = 'block';
                wInput.focus();
            } else {
                customDiv.style.display = 'none';
                const [w, h] = value.split('x').map(Number);
                wInput.value = w;
                hInput.value = h;
            }
        }
    </script>
    <script src="/static/annotator.js?v=16"></script>
</body>
</html>
